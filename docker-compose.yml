services:
  stellegent:
    image: eaglestelle/stellegent:latest
    ports:
      - "8000:8000"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: phi3:mini
      OLLAMA_AUTO_PULL: "true"
      OLLAMA_PULL_TIMEOUT: 1800
      OCR_BACKEND: auto
      GEMINI_API_KEY: ""
      GEMINI_MODEL: gemini-2.5-flash
      STELLEGENT_JWT_SECRET: change-me-to-a-32-plus-char-secret
      GOOGLE_OAUTH_CLIENT_ID: ""
      GOOGLE_OAUTH_CLIENT_SECRET: ""
      GOOGLE_ALLOWED_DOMAIN: ""
      RESEND_API_KEY: ""
      RESEND_FROM_EMAIL: "Stellegent <no-reply@example.com>"
      RESEND_REPLY_TO: ""
    volumes:
      - ./data:/data
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ./ollama:/root/.ollama
    restart: unless-stopped
