services:
  stellegent:
    build: .
    image: eaglestelle/stellegent:latest
    ports:
      - "${STELLEGENT_PORT:-8000}:8000"
    environment:
      # Core security
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@example.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      STELLEGENT_JWT_SECRET: "${STELLEGENT_JWT_SECRET:?Set STELLEGENT_JWT_SECRET in .env}"
      STELLEGENT_JWT_EXPIRY_MIN: "${STELLEGENT_JWT_EXPIRY_MIN:-30}"
      STELLEGENT_REQUIRE_SECURE_CONFIG: "${STELLEGENT_REQUIRE_SECURE_CONFIG:-false}"

      # App
      STELLEGENT_APP_NAME: "${STELLEGENT_APP_NAME:-Stellegent}"
      STELLEGENT_DATA: "${STELLEGENT_DATA:-data}"
      STELLEGENT_DB: "${STELLEGENT_DB:-data/stellegent.db}"
      STELLEGENT_RETENTION_AUDIT_DAYS: "${STELLEGENT_RETENTION_AUDIT_DAYS:-90}"
      STELLEGENT_RETENTION_SWEEP_HOURS: "${STELLEGENT_RETENTION_SWEEP_HOURS:-6}"

      # Public URL
      STELLEGENT_PUBLIC_BASE_URL: "${STELLEGENT_PUBLIC_BASE_URL:-}"
      STELLEGENT_COOKIE_SECURE: "${STELLEGENT_COOKIE_SECURE:-false}"
      STELLEGENT_COOKIE_SAMESITE: "${STELLEGENT_COOKIE_SAMESITE:-lax}"
      STELLEGENT_SECURITY_HEADERS: "${STELLEGENT_SECURITY_HEADERS:-true}"
      STELLEGENT_SECURITY_HSTS: "${STELLEGENT_SECURITY_HSTS:-false}"

      # Google OAuth
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET:-}"
      GOOGLE_OAUTH_REDIRECT_URI: "${GOOGLE_OAUTH_REDIRECT_URI:-}"
      GOOGLE_ALLOWED_DOMAIN: "${GOOGLE_ALLOWED_DOMAIN:-}"

      # Email (Resend)
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL:-Stellegent <no-reply@example.com>}"
      RESEND_REPLY_TO: "${RESEND_REPLY_TO:-}"

      # OCR
      OCR_BACKEND: "${OCR_BACKEND:-auto}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-3.5-flash}"
      GEMINI_MODELS: "${GEMINI_MODELS:-}"

      # Local NLP (Ollama)
      OLLAMA_HOST: "${OLLAMA_HOST:-http://ollama:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-phi3:mini}"
      OLLAMA_AUTO_PULL: "${OLLAMA_AUTO_PULL:-true}"
      OLLAMA_PULL_TIMEOUT: "${OLLAMA_PULL_TIMEOUT:-1800}"
      OLLAMA_REQUEST_TIMEOUT: "${OLLAMA_REQUEST_TIMEOUT:-1800}"
      OLLAMA_NUM_CTX: "${OLLAMA_NUM_CTX:-4096}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-5m}"
    volumes:
      - stellegent-data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ./local/ollama:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  stellegent-data:
