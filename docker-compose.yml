services:
  stellegent:
    image: eaglestelle/stellegent:latest
    ports:
      - "8000:8000"
    environment:
      # Core security
      STELLEGENT_JWT_SECRET: change-me-to-a-32-plus-char-secret # openssl rand -hex 32
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "admin123"
      STELLEGENT_REQUIRE_SECURE_CONFIG: "false"

      # Public URL
      STELLEGENT_PUBLIC_BASE_URL: ""
      STELLEGENT_COOKIE_SECURE: "true"
      STELLEGENT_COOKIE_SAMESITE: "lax"
      STELLEGENT_SECURITY_HEADERS: "true"
      STELLEGENT_SECURITY_HSTS: "true"

      # Google OAuth
      GOOGLE_OAUTH_CLIENT_ID: ""
      GOOGLE_OAUTH_CLIENT_SECRET: ""

      # Email (Resend)
      RESEND_API_KEY: ""
      RESEND_FROM_EMAIL: "Stellegent <no-reply@example.com>"
      RESEND_REPLY_TO: ""

      # OCR
      OCR_BACKEND: auto
      GEMINI_API_KEY: ""
      GEMINI_MODEL: gemini-3.5-flash

      # Local NLP (Ollama)
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: phi3:mini
      OLLAMA_AUTO_PULL: "true"
      OLLAMA_PULL_TIMEOUT: 1800
      OLLAMA_REQUEST_TIMEOUT: 1800
      # 4 GB VRAM: smaller context reduces CPU spillover.
      # OLLAMA_NUM_CTX: 1024
      # OLLAMA_KEEP_ALIVE: 30m
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ./ollama:/root/.ollama
    restart: unless-stopped
    # GPU acceleration (local dev only; NOT used on Raspberry Pi 5 production).
    # Requires an NVIDIA GPU + nvidia-container-toolkit on the host.
    # Uncomment to offload inference to the GPU instead of CPU.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
