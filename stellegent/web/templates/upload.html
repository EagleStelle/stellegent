{% extends "base.html" %}
{% block title %}Upload — Stellegent{% endblock %}
{% block content %}
<h2>Upload whiteboard image</h2>
<p>Drag & drop an image, or click to choose. Runs the same pipeline as a live capture.</p>

<form id="up-form" enctype="multipart/form-data">
  <label>Course (optional)
    <input type="text" name="course" placeholder="e.g. CS101">
  </label>
  <div id="dz" class="dropzone">
    <p>Drop image here, or <label class="link"><input type="file" name="image" accept="image/*" hidden id="file-input"> click to browse</label></p>
    <p id="fname" class="muted"></p>
    <img id="preview" alt="" hidden>
  </div>
  <button type="submit" id="submit-btn" disabled>Process</button>
  <span id="status"></span>
</form>

<script>
const dz = document.getElementById('dz');
const fi = document.getElementById('file-input');
const fname = document.getElementById('fname');
const preview = document.getElementById('preview');
const submitBtn = document.getElementById('submit-btn');
const statusEl = document.getElementById('status');
const form = document.getElementById('up-form');

let pickedFile = null;

function pickFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    statusEl.textContent = 'Not an image.';
    return;
  }
  pickedFile = file;
  fname.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
  preview.src = URL.createObjectURL(file);
  preview.hidden = false;
  submitBtn.disabled = false;
  statusEl.textContent = '';
}

['dragenter', 'dragover'].forEach(ev => dz.addEventListener(ev, e => {
  e.preventDefault(); dz.classList.add('drag');
}));
['dragleave', 'drop'].forEach(ev => dz.addEventListener(ev, e => {
  e.preventDefault(); dz.classList.remove('drag');
}));
dz.addEventListener('drop', e => {
  if (e.dataTransfer.files && e.dataTransfer.files[0]) pickFile(e.dataTransfer.files[0]);
});
fi.addEventListener('change', e => {
  if (e.target.files && e.target.files[0]) pickFile(e.target.files[0]);
});

form.addEventListener('submit', async e => {
  e.preventDefault();
  if (!pickedFile) return;
  submitBtn.disabled = true;
  statusEl.textContent = 'Processing... (OCR + NLP can take 10-30s)';
  const fd = new FormData();
  fd.append('image', pickedFile);
  const course = form.course.value.trim();
  if (course) fd.append('course', course);
  try {
    const r = await fetch('/api/upload', { method: 'POST', body: fd });
    const j = await r.json();
    if (j.lecture_id) {
      location.href = '/lecture/' + j.lecture_id;
    } else {
      statusEl.textContent = 'Error: ' + (j.error || 'unknown');
      submitBtn.disabled = false;
    }
  } catch (err) {
    statusEl.textContent = 'Network error: ' + err;
    submitBtn.disabled = false;
  }
});
</script>
{% endblock %}
