<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/logo.svg" />
		<title>Stellegent</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Apply theme before paint to avoid flash of wrong theme.
			(function () {
				const stored = localStorage.getItem('theme');
				const dark = stored ? stored === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
				if (dark) document.documentElement.classList.add('dark');
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
